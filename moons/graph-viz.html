;

const typeColors = {
  claim: '#f0883e',
  paper: '#58a6ff',
  concept: '#3fb950',
  component: '#bc8cff',
  chapter: '#f778ba',
  person: '#ffd700',
  voice: '#79c0ff',
  meta: '#8b949e'
};

const typeLabels = {
  claim: 'Claim',
  paper: 'Paper',
  concept: 'Concept',
  component: 'Component',
  chapter: 'Chapter',
  person: 'Person',
  voice: 'Voice',
  meta: 'Meta'
};

// Build nodes and links
const nodeMap = {};
const nodes = graphData.nodes.map(n => {
  const obj = { id: n.id, type: n.type, desc: n.desc, edges: n.edges, outDegree: n.edges.length, inDegree: 0 };
  nodeMap[n.id] = obj;
  return obj;
});

const links = [];
const edgeRelColors = {
  supports: '#3fb950',
  contrasts: '#f85149',
  cited_in: '#58a6ff',
  demonstrated_by: '#bc8cff',
  rationale: '#ffd700',
  replaced_by: '#8b949e',
  related: '#484f58',
  discussed_in: '#484f58',
  advises: '#ffd700',
  implements: '#bc8cff'
};

graphData.nodes.forEach(n => {
  n.edges.forEach(e => {
    if (nodeMap[e.to]) {
      links.push({ source: n.id, target: e.to, rel: e.rel });
      nodeMap[e.to].inDegree++;
    }
  });
});

nodes.forEach(n => { n.degree = n.outDegree + n.inDegree; });
const maxDegree = d3.max(nodes, d => d.degree);
const radiusScale = d3.scaleSqrt().domain([0, maxDegree]).range([4, 28]);

// Stats
document.getElementById('stats').innerHTML = `
  <h3>Graph Stats</h3>
  <div>${nodes.length} nodes &middot; ${links.length} edges</div>
  <div style="margin-top:4px;color:#8b949e">Scroll to zoom &middot; Drag nodes &middot; Hover for details</div>
`;

// Legend
const legend = document.getElementById('legend');
Object.entries(typeLabels).forEach(([type, label]) => {
  const count = nodes.filter(n => n.type === type).length;
  if (count === 0) return;
  const div = document.createElement('div');
  div.className = 'legend-item';
  div.innerHTML = `<div class="legend-dot" style="background:${typeColors[type]}"></div>${label} (${count})`;
  legend.appendChild(div);
});

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select('#graph');
const g = svg.append('g');

const zoom = d3.zoom()
  .scaleExtent([0.2, 5])
  .on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(80))
  .force('charge', d3.forceManyBody().strength(-200))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide().radius(d => radiusScale(d.degree) + 4));

const link = g.append('g')
  .selectAll('line')
  .data(links)
  .join('line')
  .attr('stroke', d => edgeRelColors[d.rel] || '#30363d')
  .attr('stroke-opacity', 0.25)
  .attr('stroke-width', 1);

const node = g.append('g')
  .selectAll('g')
  .data(nodes)
  .join('g')
  .call(d3.drag()
    .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
  );

node.append('circle')
  .attr('r', d => radiusScale(d.degree))
  .attr('fill', d => typeColors[d.type])
  .attr('stroke', '#0d1117')
  .attr('stroke-width', 1.5)
  .attr('opacity', 0.9);

node.append('text')
  .text(d => d.id)
  .attr('font-size', d => Math.max(8, Math.min(12, radiusScale(d.degree) * 0.7)))
  .attr('fill', '#c9d1d9')
  .attr('text-anchor', 'middle')
  .attr('dy', d => radiusScale(d.degree) + 12)
  .attr('pointer-events', 'none');

const tooltip = document.getElementById('tooltip');

node.on('mouseover', (e, d) => {
  tooltip.style.opacity = 1;
  tooltip.innerHTML = `
    <div class="tt-id">${d.id}</div>
    <div class="tt-type">${d.type} &middot; ${d.degree} connections (${d.inDegree} in, ${d.outDegree} out)</div>
    <div class="tt-desc">${d.desc}</div>
    <div class="tt-edges">${d.edges.map(e => `${e.rel} &rarr; ${e.to}`).join('<br>')}</div>
  `;
  // Highlight connected
  const connected = new Set();
  links.forEach(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });
  connected.add(d.id);

  node.selectAll('circle').attr('opacity', n => connected.has(n.id) ? 1 : 0.1);
  node.selectAll('text').attr('opacity', n => connected.has(n.id) ? 1 : 0.1);
  link.attr('stroke-opacity', l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    return (sid === d.id || tid === d.id) ? 0.7 : 0.03;
  }).attr('stroke-width', l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    return (sid === d.id || tid === d.id) ? 2 : 1;
  });
}).on('mousemove', e => {
  tooltip.style.left = (e.clientX + 16) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
}).on('mouseout', () => {
  tooltip.style.opacity = 0;
  node.selectAll('circle').attr('opacity', 0.9);
  node.selectAll('text').attr('opacity', 1);
  link.attr('stroke-opacity', 0.25).attr('stroke-width', 1);
});

simulation.on('tick', () => {
  link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});
</script>
