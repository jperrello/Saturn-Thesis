<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }

#controls {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  background: rgba(10,10,26,0.92); backdrop-filter: blur(8px);
  padding: 12px 20px; display: flex; align-items: center; gap: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
#controls h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; color: #fff; }
#controls h1 span { color: #888; font-weight: 400; }

.legend { display: flex; gap: 10px; flex-wrap: wrap; margin-left: auto; }
.legend-item {
  display: flex; align-items: center; gap: 5px; font-size: 12px;
  cursor: pointer; padding: 3px 8px; border-radius: 12px;
  transition: opacity 0.2s;
}
.legend-item.dimmed { opacity: 0.3; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

#search {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 13px; width: 180px;
  outline: none;
}
#search:focus { border-color: rgba(255,255,255,0.3); }
#search::placeholder { color: #666; }

#tooltip {
  position: fixed; pointer-events: none; z-index: 20;
  background: rgba(20,20,40,0.95); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; padding: 12px 16px; max-width: 320px;
  font-size: 13px; line-height: 1.5; display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#tooltip .tt-id { font-weight: 600; color: #fff; margin-bottom: 4px; }
#tooltip .tt-type { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
#tooltip .tt-desc { color: #bbb; }
#tooltip .tt-file { color: #666; font-size: 11px; margin-top: 6px; font-family: monospace; }
#tooltip .tt-edges { color: #888; font-size: 11px; margin-top: 4px; }

#detail {
  position: fixed; bottom: 20px; left: 20px; z-index: 10;
  background: rgba(20,20,40,0.95); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; padding: 16px 20px; max-width: 360px;
  display: none; font-size: 13px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#detail .d-close {
  position: absolute; top: 8px; right: 12px; cursor: pointer;
  color: #666; font-size: 18px;
}
#detail .d-close:hover { color: #fff; }
#detail .d-id { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 4px; }
#detail .d-type { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
#detail .d-desc { color: #ccc; margin-bottom: 8px; }
#detail .d-file { color: #888; font-size: 12px; font-family: monospace; margin-bottom: 8px; }
#detail .d-edges { color: #aaa; font-size: 12px; }
#detail .d-edges div { margin: 2px 0; }
#detail .d-edges .edge-rel { color: #666; font-size: 11px; }

#stats {
  position: fixed; bottom: 20px; right: 20px; z-index: 10;
  font-size: 11px; color: #555;
}

svg { width: 100vw; height: 100vh; }

.link { stroke-opacity: 0.25; fill: none; }
.link.highlighted { stroke-opacity: 0.8; }
.link-label { font-size: 9px; fill: #555; pointer-events: none; display: none; }
.link-label.visible { display: block; }

.node circle { stroke-width: 2; cursor: pointer; transition: r 0.15s; }
.node circle:hover { filter: brightness(1.3); }
.node text {
  font-size: 10px; fill: #aaa; pointer-events: none;
  text-anchor: middle; dominant-baseline: central;
}
.node.dimmed circle { opacity: 0.12; }
.node.dimmed text { opacity: 0.08; }
.link.dimmed { stroke-opacity: 0.04; }
.node.search-match circle { stroke: #fff; stroke-width: 3; }
</style>
</head>

n, HCI","file":"meta/advisors.md","edges":[{"to":"ch5","rel":"advises"},{"to":"interview-1","rel":"related"},{"to":"meeting-log","rel":"related"}]},{"id":"ram-raman","type":"person","desc":"Co-advisor — network security, Internet measurement, censorship","file":"meta/advisors.md","edges":[{"to":"ch7","rel":"advises"},{"to":"interview-1","rel":"related"}]},{"id":"interview-1","type":"voice","desc":"Session 1 (2026-01-27) — advisors, framing, timeline","file":"voice/interview-1.md","edges":[{"to":"adam-smith","rel":"related"},{"to":"ram-raman","rel":"related"}]},{"id":"interview-2","type":"voice","desc":"Session 2 (2026-02-07) — beacon vs proxy, router details, eval","file":"voice/interview-2.md","edges":[{"to":"beacons","rel":"rationale"},{"to":"saturn-router","rel":"related"}]},{"id":"motivation","type":"voice","desc":"Joey's motivation — equity, $100/mo realization, eduroam analogy","file":"voice/motivation.md","edges":[{"to":"claim-1","rel":"rationale"},{"to":"claim-2","rel":"rationale"},{"to":"ch1","rel":"related"}]},{"id":"meeting-log","type":"voice","desc":"Condensed meeting notes Oct 2025 - Jan 2026","file":"voice/meeting-log.md","edges":[{"to":"adam-smith","rel":"related"},{"to":"beacons","rel":"rationale"},{"to":"saturn-router","rel":"related"}]},{"id":"failed-eval","type":"meta","desc":"Archived failed evaluation — blind agent trials, scrapped Feb 2026","file":"meta/failed-evaluation.md","edges":[{"to":"claim-1","rel":"related"},{"to":"claim-2","rel":"related"},{"to":"claim-3","rel":"related"},{"to":"ch6","rel":"related"}]},{"id":"chapter-status","type":"meta","desc":"Writing status for all chapters","file":"chapters/status.md","edges":[{"to":"ch1","rel":"related"},{"to":"ch2","rel":"related"},{"to":"ch3","rel":"related"},{"to":"ch4","rel":"related"},{"to":"ch5","rel":"related"},{"to":"ch6","rel":"related"},{"to":"ch7","rel":"related"},{"to":"ch8","rel":"related"}]},{"id":"timeline","type":"meta","desc":"Winter 2026 target, remaining TODOs","file":"meta/timeline.md","edges":[{"to":"chapter-status","rel":"related"}]},{"id":"formatting","type":"meta","desc":"UCSC thesis template requirements","file":"meta/formatting.md","edges":[]},{"id":"outreach","type":"meta","desc":"Community engagement — Reddit, GitHub, contacts","file":"meta/outreach.md","edges":[{"to":"meeting-log","rel":"related"}]},{"id":"fall-report","type":"meta","desc":"Fall 2025 quarterly report — cost framing, system overview, implementations","file":"meta/fall-report.md","edges":[{"to":"motivation","rel":"related"},{"to":"ch1","rel":"related"},{"to":"vlc-ext","rel":"related"},{"to":"owui","rel":"related"}]},{"id":"concept-ladder","type":"meta","desc":"Pedagogical concept ladder — 10 rungs from problem to thesis claims","file":"concept-ladder.md","edges":[{"to":"claim-1","rel":"related"},{"to":"claim-2","rel":"related"},{"to":"claim-3","rel":"related"},{"to":"mdns","rel":"related"},{"to":"beacons","rel":"related"},{"to":"ephemeral-keys","rel":"related"},{"to":"motivation","rel":"related"}]}]};

const COLORS = {
  claim:     '#e74c3c',
  concept:   '#3498db',
  paper:     '#2ecc71',
  component: '#e67e22',
  chapter:   '#9b59b6',
  person:    '#f1c40f',
  voice:     '#1abc9c',
  meta:      '#95a5a6'
};

const RADIUS = {
  claim: 14, concept: 11, paper: 9, component: 12,
  chapter: 13, person: 10, voice: 9, meta: 8
};

const EDGE_COLORS = {
  supports:       '#2ecc71',
  contrasts:      '#e74c3c',
  cited_in:       '#3498db',
  discussed_in:   '#9b59b6',
  demonstrated_by:'#e67e22',
  rationale:      '#1abc9c',
  replaced_by:    '#95a5a6',
  related:        '#555',
  advises:        '#f1c40f',
  implements:     '#e67e22'
};

let graph, nodes, links;
let simulation;
let activeTypes = new Set(Object.keys(COLORS));
let selectedNode = null;

// Try fetch first (works when served via HTTP), fall back to inline data
fetch('../moons/graph.json')
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => { graph = data; build(data); })
  .catch(() => { graph = GRAPH_DATA; build(GRAPH_DATA); });

function build(data) {
  nodes = data.nodes.map(n => ({...n}));
  links = [];
  const ids = new Set(nodes.map(n => n.id));

  for (const n of data.nodes) {
    if (!n.edges) continue;
    for (const e of n.edges) {
      if (ids.has(e.to)) {
        links.push({ source: n.id, target: e.to, rel: e.rel });
      }
    }
  }

  // stats
  document.getElementById('stats').textContent =
    `${nodes.length} nodes · ${links.length} edges`;

  // legend
  const legend = document.getElementById('legend');
  for (const [type, color] of Object.entries(COLORS)) {
    const count = nodes.filter(n => n.type === type).length;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-dot" style="background:${color}"></span>${type} (${count})`;
    item.onclick = () => toggleType(type, item);
    legend.appendChild(item);
  }

  const w = window.innerWidth;
  const h = window.innerHeight;
  const svg = d3.select('svg');

  const g = svg.append('g');

  // zoom
  const zoom = d3.zoom()
    .scaleExtent([0.2, 5])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  // arrow markers
  const defs = svg.append('defs');
  for (const [rel, color] of Object.entries(EDGE_COLORS)) {
    defs.append('marker')
      .attr('id', `arrow-${rel}`)
      .attr('viewBox', '0 -4 8 8')
      .attr('refX', 20)
      .attr('refY', 0)
      .attr('markerWidth', 6)
      .attr('markerHeight', 6)
      .attr('orient', 'auto')
      .append('path')
      .attr('d', 'M0,-4L8,0L0,4')
      .attr('fill', color);
  }

  // links
  const link = g.append('g')
    .selectAll('line')
    .data(links)
    .join('line')
    .attr('class', 'link')
    .attr('stroke', d => EDGE_COLORS[d.rel] || '#444')
    .attr('stroke-width', d => d.rel === 'supports' || d.rel === 'demonstrated_by' ? 1.5 : 1)
    .attr('marker-end', d => `url(#arrow-${d.rel})`);

  // link labels
  const linkLabel = g.append('g')
    .selectAll('text')
    .data(links)
    .join('text')
    .attr('class', 'link-label')
    .text(d => d.rel);

  // nodes
  const node = g.append('g')
    .selectAll('g')
    .data(nodes)
    .join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag', dragging)
      .on('end', dragEnd));

  node.append('circle')
    .attr('r', d => RADIUS[d.type] || 8)
    .attr('fill', d => COLORS[d.type] || '#666')
    .attr('stroke', d => d3.color(COLORS[d.type] || '#666').darker(0.5));

  node.append('text')
    .text(d => d.id)
    .attr('dy', d => (RADIUS[d.type] || 8) + 12);

  // tooltip
  const tooltip = document.getElementById('tooltip');
  node.on('mouseover', (e, d) => {
    const edgeCount = links.filter(l =>
      (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id
    ).length;
    tooltip.querySelector('.tt-id').textContent = d.id;
    tooltip.querySelector('.tt-type').textContent = d.type;
    tooltip.querySelector('.tt-type').style.color = COLORS[d.type];
    tooltip.querySelector('.tt-desc').textContent = d.desc;
    tooltip.querySelector('.tt-file').textContent = d.file || '';
    tooltip.querySelector('.tt-edges').textContent = `${edgeCount} connections`;
    tooltip.style.display = 'block';

    // highlight connected
    const connected = new Set();
    connected.add(d.id);
    links.forEach(l => {
      const sid = l.source.id || l.source;
      const tid = l.target.id || l.target;
      if (sid === d.id) connected.add(tid);
      if (tid === d.id) connected.add(sid);
    });

    node.classed('dimmed', n => !connected.has(n.id));
    link.classed('dimmed', l => {
      const sid = l.source.id || l.source;
      const tid = l.target.id || l.target;
      return sid !== d.id && tid !== d.id;
    });
    link.classed('highlighted', l => {
      const sid = l.source.id || l.source;
      const tid = l.target.id || l.target;
      return sid === d.id || tid === d.id;
    });
    linkLabel.classed('visible', l => {
      const sid = l.source.id || l.source;
      const tid = l.target.id || l.target;
      return sid === d.id || tid === d.id;
    });
  })
  .on('mousemove', e => {
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  })
  .on('mouseout', () => {
    tooltip.style.display = 'none';
    node.classed('dimmed', false);
    link.classed('dimmed', false);
    link.classed('highlighted', false);
    linkLabel.classed('visible', false);
  });

  // click for detail panel
  node.on('click', (e, d) => {
    e.stopPropagation();
    showDetail(d);
  });
  svg.on('click', () => {
    document.getElementById('detail').style.display = 'none';
    selectedNode = null;
  });
  document.querySelector('.d-close').onclick = () => {
    document.getElementById('detail').style.display = 'none';
    selectedNode = null;
  };

  // search
  const searchInput = document.getElementById('search');
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase().trim();
    if (!q) {
      node.classed('search-match', false);
      node.classed('dimmed', false);
      link.classed('dimmed', false);
      return;
    }
    node.classed('search-match', d =>
      d.id.toLowerCase().includes(q) || d.desc.toLowerCase().includes(q) || d.type.toLowerCase().includes(q)
    );
    const matches = new Set();
    nodes.forEach(n => {
      if (n.id.toLowerCase().includes(q) || n.desc.toLowerCase().includes(q) || n.type.toLowerCase().includes(q)) {
        matches.add(n.id);
      }
    });
    node.classed('dimmed', d => matches.size > 0 && !matches.has(d.id));
    link.classed('dimmed', l => {
      const sid = l.source.id || l.source;
      const tid = l.target.id || l.target;
      return matches.size > 0 && !matches.has(sid) && !matches.has(tid);
    });
  });

  // simulation
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => {
      if (d.rel === 'discussed_in' || d.rel === 'cited_in') return 120;
      if (d.rel === 'supports' || d.rel === 'demonstrated_by') return 90;
      return 100;
    }))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(w / 2, h / 2))
    .force('collision', d3.forceCollide().radius(d => (RADIUS[d.type] || 8) + 8))
    .force('x', d3.forceX(w / 2).strength(0.04))
    .force('y', d3.forceY(h / 2).strength(0.04))
    .on('tick', () => {
      link
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);
      linkLabel
        .attr('x', d => (d.source.x + d.target.x) / 2)
        .attr('y', d => (d.source.y + d.target.y) / 2);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });

  // center initially
  setTimeout(() => {
    svg.call(zoom.transform, d3.zoomIdentity.translate(0, 50));
  }, 100);

  // expose for filter
  window._node = node;
  window._link = link;
  window._linkLabel = linkLabel;
}

function showDetail(d) {
  selectedNode = d;
  const det = document.getElementById('detail');
  det.querySelector('.d-id').textContent = d.id;
  det.querySelector('.d-type').textContent = d.type;
  det.querySelector('.d-type').style.color = COLORS[d.type];
  det.querySelector('.d-desc').textContent = d.desc;
  det.querySelector('.d-file').textContent = d.file || '';

  const edgesDiv = det.querySelector('.d-edges');
  edgesDiv.innerHTML = '';
  if (d.edges) {
    for (const e of d.edges) {
      const div = document.createElement('div');
      div.innerHTML = `<span class="edge-rel">${e.rel}</span> &rarr; ${e.to}`;
      edgesDiv.appendChild(div);
    }
  }
  // incoming edges
  const incoming = links.filter(l => (l.target.id || l.target) === d.id);
  if (incoming.length) {
    const hdr = document.createElement('div');
    hdr.style.marginTop = '6px';
    hdr.style.color = '#666';
    hdr.style.fontSize = '11px';
    hdr.textContent = 'Incoming:';
    edgesDiv.appendChild(hdr);
    for (const l of incoming) {
      const div = document.createElement('div');
      const sid = l.source.id || l.source;
      div.innerHTML = `${sid} <span class="edge-rel">${l.rel}</span> &rarr;`;
      edgesDiv.appendChild(div);
    }
  }

  det.style.display = 'block';
}

function toggleType(type, el) {
  if (activeTypes.has(type)) {
    activeTypes.delete(type);
    el.classList.add('dimmed');
  } else {
    activeTypes.add(type);
    el.classList.remove('dimmed');
  }
  window._node.style('display', d => activeTypes.has(d.type) ? null : 'none');
  window._link.style('display', d => {
    const st = d.source.type || nodes.find(n => n.id === d.source)?.type;
    const tt = d.target.type || nodes.find(n => n.id === d.target)?.type;
    return activeTypes.has(st) && activeTypes.has(tt) ? null : 'none';
  });
}

function dragStart(e, d) {
  if (!e.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragging(e, d) { d.fx = e.x; d.fy = e.y; }
function dragEnd(e, d) {
  if (!e.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}
</script>
</body>
