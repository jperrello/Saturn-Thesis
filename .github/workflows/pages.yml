name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'visualizations/**'
      - 'docs/index.html'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site
          cp docs/index.html _site/
          cp visualizations/moons.html _site/
          cp visualizations/concept-ladder.html _site/
          cp visualizations/cognitive-walkthrough.html _site/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
      - id: deployment
        uses: actions/deploy-pages@v4
